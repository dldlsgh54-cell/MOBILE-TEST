<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>모바일 작업 도우미</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --ink: #162033;
      --muted: #667085;
      --line: #d9e0ea;
      --accent: #0f766e;
      --accent-soft: #e6fffb;
      --done: #15803d;
      --warn: #b45309;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    main {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: 16px;
    }
    header {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: 0;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 18px;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin: 12px 0;
    }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0;
    }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 14px;
    }
    textarea, input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      font: inherit;
      background: #fff;
      color: var(--ink);
    }
    textarea {
      min-height: 138px;
      resize: vertical;
      line-height: 1.45;
    }
    button, a.button {
      border: 1px solid transparent;
      border-radius: 8px;
      min-height: 44px;
      padding: 10px 13px;
      font: inherit;
      font-weight: 700;
      background: var(--accent);
      color: white;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-align: center;
    }
    button.secondary, a.secondary {
      background: #fff;
      color: var(--ink);
      border-color: var(--line);
    }
    button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    button.done {
      background: #ecfdf3;
      color: var(--done);
      border-color: #bbf7d0;
    }
    button.warn {
      background: #fff7ed;
      color: var(--warn);
      border-color: #fed7aa;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .controls.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .prompt-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .prompt textarea {
      min-height: 116px;
      font-size: 14px;
    }
    .current {
      border-color: #99f6e4;
      box-shadow: 0 0 0 2px rgba(20, 184, 166, .16);
    }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .status {
      color: var(--accent);
      font-weight: 700;
      margin-top: 10px;
    }
    .progress {
      height: 12px;
      overflow: hidden;
      background: #e5e7eb;
      border-radius: 999px;
      margin-top: 8px;
    }
    .bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width .2s ease;
    }
    .log {
      white-space: pre-wrap;
      background: #101828;
      color: #f9fafb;
      border-radius: 8px;
      padding: 12px;
      min-height: 90px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 12px;
      overflow: auto;
    }
    .image-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .option-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .piece {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #f8fafc;
    }
    .piece img {
      width: 100%;
      display: block;
      border-radius: 6px;
      background: #e5e7eb;
    }
    .piece span {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      color: #475467;
      overflow-wrap: anywhere;
    }
    .hidden { display: none; }
    @media (max-width: 760px) {
      main { padding: 14px; }
      h1 { font-size: 25px; }
      .prompt-grid, .image-options, .preview-grid { grid-template-columns: 1fr; }
      .controls, .controls.three, .option-row { grid-template-columns: 1fr; }
      button, a.button { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>모바일 작업 도우미</h1>
      <p>휴대폰 브라우저에서 프롬프트를 나누어 복사하거나, 이미지 파일을 여러 장으로 분할합니다.</p>
    </header>

    <nav class="tabs" aria-label="도구 선택">
      <button id="promptTab" class="active" type="button">프롬프트 도우미</button>
      <button id="imageTab" class="secondary" type="button">이미지 분할</button>
    </nav>

    <section id="promptTool">
      <section class="panel">
        <h2>프롬프트 분리</h2>
        <label for="sourceText">전체 프롬프트</label>
        <textarea id="sourceText" placeholder="Prompt 1: ...&#10;&#10;Prompt 2: ...&#10;&#10;또는 1. / 2. 형식으로 붙여넣으세요."></textarea>
        <div class="controls three">
          <button id="pasteBtn" type="button">붙여넣기</button>
          <button id="splitBtn" type="button">자동 분리</button>
          <button id="clearBtn" class="secondary" type="button">초기화</button>
        </div>
        <p class="muted">모바일 브라우저 보안상 ChatGPT 자동 조작은 할 수 없습니다. 분리한 프롬프트를 복사해서 ChatGPT 앱이나 웹에 직접 붙여넣어 주세요.</p>
      </section>

      <section class="panel">
        <div class="row">
          <strong id="statusText">프롬프트를 입력하세요</strong>
          <span class="muted" id="counterText">0/6 완료</span>
        </div>
        <div class="progress"><div class="bar" id="progressBar"></div></div>
        <div class="controls three">
          <button id="copyCurrentBtn" type="button">현재 복사</button>
          <button id="nextBtn" class="secondary" type="button">다음</button>
          <button id="doneBtn" class="done" type="button">완료 표시</button>
        </div>
      </section>

      <section class="prompt-grid" id="promptGrid"></section>

      <section class="panel">
        <div class="row">
          <strong>로그</strong>
          <button id="copyAllBtn" class="secondary" type="button">전체 복사</button>
        </div>
        <div id="log" class="log">아직 기록이 없습니다.</div>
      </section>
    </section>

    <section id="imageTool" class="hidden">
      <section class="panel">
        <h2>이미지 분할</h2>
        <label for="sourceImages">이미지 선택</label>
        <input id="sourceImages" type="file" accept="image/*" multiple>
        <p id="fileStatus" class="status">선택한 이미지 없음</p>
      </section>

      <section class="panel image-options">
        <div>
          <label for="splitCols">가로 칸 수</label>
          <input id="splitCols" type="number" min="1" max="20" value="4">
        </div>
        <div>
          <label for="splitRows">세로 칸 수</label>
          <input id="splitRows" type="number" min="1" max="20" value="2">
        </div>
      </section>

      <section class="panel">
        <label>출력 비율</label>
        <div class="option-row" id="aspectOptions">
          <button class="active" type="button" data-value="auto">원본</button>
          <button class="secondary" type="button" data-value="9:16">9:16</button>
          <button class="secondary" type="button" data-value="16:9">16:9</button>
          <button class="secondary" type="button" data-value="1:1">1:1</button>
        </div>
      </section>

      <section class="panel">
        <label>해상도</label>
        <div class="option-row" id="resolutionOptions">
          <button class="active" type="button" data-value="original">원본</button>
          <button class="secondary" type="button" data-value="2k">2K</button>
          <button class="secondary" type="button" data-value="4k">4K</button>
          <button class="secondary" type="button" data-value="1080">1080p</button>
        </div>
      </section>

      <section class="panel">
        <button id="runImageBtn" type="button">ZIP으로 다운로드</button>
        <p id="imageStatus" class="status">대기 중</p>
      </section>

      <section class="panel">
        <div id="preview" class="preview-grid"></div>
      </section>
    </section>
  </main>

  <script>
    const state = {
      prompts: Array(6).fill(""),
      current: 0,
      done: Array(6).fill(false),
      log: []
    };
    const $ = (id) => document.getElementById(id);
    const grid = $("promptGrid");
    let aspectRatio = "auto";
    let resolution = "original";
    let pieces = [];

    function stamp() {
      return new Date().toLocaleTimeString("ko-KR", { hour12: false });
    }

    function addLog(message) {
      state.log.unshift(`[${stamp()}] ${message}`);
      $("log").textContent = state.log.join("\n") || "아직 기록이 없습니다.";
      saveLocal();
    }

    function showTool(tool) {
      const prompt = tool === "prompt";
      $("promptTool").classList.toggle("hidden", !prompt);
      $("imageTool").classList.toggle("hidden", prompt);
      $("promptTab").className = prompt ? "active" : "secondary";
      $("imageTab").className = prompt ? "secondary" : "active";
    }

    function parsePrompts(raw) {
      const text = raw.replace(/\r/g, "").trim();
      if (!text) return [];
      const lines = text.split("\n");
      const blocks = [];
      let current = "";
      let activeBlock = false;
      const label = /^(?:#{1,6}\s*)?(?:컷|이미지|프롬프트|prompt|cut|image)\s*([0-9]+)\s*(?:[\).:\-]|번)?\s*(.*)$/i;
      const numberLabel = /^([0-9]+)\s*[\).:\-]\s*(.*)$/;

      function flush() {
        const value = current.trim();
        if (value) blocks.push(value);
        current = "";
        activeBlock = false;
      }

      for (const rawLine of lines) {
        const line = rawLine.trim();
        if (!line) {
          if (activeBlock && current) current += "\n";
          continue;
        }
        const match = line.match(label);
        const numberMatch = line.match(numberLabel);
        if (match || numberMatch) {
          flush();
          activeBlock = true;
          current = ((match && match[2]) || (numberMatch && numberMatch[2]) || "").trim();
        } else if (activeBlock) {
          current += (current.endsWith("\n") ? "" : "\n") + line;
        }
      }
      flush();
      if (blocks.length) return blocks.slice(0, 6);

      const paragraphs = text.split(/\n\s*\n/).map((value) => value.trim()).filter(Boolean);
      if (paragraphs.length >= 2) return paragraphs.slice(0, 6);
      return lines.map((value) => value.trim().replace(/^[-*]\s*/, "")).filter((value) => value.length >= 8).slice(0, 6);
    }

    function renderPrompts() {
      grid.innerHTML = "";
      state.prompts.forEach((prompt, index) => {
        const box = document.createElement("section");
        box.className = `panel prompt ${index === state.current ? "current" : ""}`;
        box.innerHTML = `
          <label for="prompt${index}">프롬프트 ${index + 1}${state.done[index] ? " 완료" : ""}</label>
          <textarea id="prompt${index}" data-index="${index}"></textarea>
          <div class="controls">
            <button type="button" data-copy="${index}">복사</button>
            <button type="button" class="done" data-done="${index}">완료</button>
          </div>
        `;
        grid.appendChild(box);
        box.querySelector("textarea").value = prompt;
      });
      grid.querySelectorAll("textarea").forEach((area) => {
        area.addEventListener("input", (event) => {
          state.prompts[Number(event.target.dataset.index)] = event.target.value;
          saveLocal();
        });
      });
      grid.querySelectorAll("[data-copy]").forEach((button) => {
        button.addEventListener("click", () => copyPrompt(Number(button.dataset.copy)));
      });
      grid.querySelectorAll("[data-done]").forEach((button) => {
        button.addEventListener("click", () => markDone(Number(button.dataset.done)));
      });
      updateStatus();
    }

    function updateStatus() {
      const doneCount = state.done.filter(Boolean).length;
      $("counterText").textContent = `${doneCount}/6 완료`;
      $("progressBar").style.width = `${Math.round(doneCount / 6 * 100)}%`;
      $("statusText").textContent = state.prompts[state.current]
        ? `현재 프롬프트 ${state.current + 1}`
        : "프롬프트를 입력하세요";
      saveLocal();
    }

    async function copyText(text) {
      if (!text.trim()) {
        alert("복사할 내용이 없습니다.");
        return false;
      }
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch {
        const temp = document.createElement("textarea");
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        temp.remove();
        return true;
      }
    }

    async function copyPrompt(index) {
      const ok = await copyText(state.prompts[index]);
      if (ok) {
        state.current = index;
        addLog(`프롬프트 ${index + 1} 복사`);
        renderPrompts();
      }
    }

    function markDone(index) {
      state.done[index] = true;
      state.current = Math.min(5, index + 1);
      addLog(`프롬프트 ${index + 1} 완료 표시`);
      renderPrompts();
    }

    function saveLocal() {
      localStorage.setItem("mobileWorkHelper", JSON.stringify(state));
    }

    function loadLocal() {
      try {
        const saved = JSON.parse(localStorage.getItem("mobileWorkHelper") || "{}");
        if (Array.isArray(saved.prompts)) state.prompts = saved.prompts.slice(0, 6).concat(Array(6).fill("")).slice(0, 6);
        if (Array.isArray(saved.done)) state.done = saved.done.slice(0, 6).concat(Array(6).fill(false)).slice(0, 6);
        if (Array.isArray(saved.log)) state.log = saved.log;
        if (Number.isInteger(saved.current)) state.current = Math.min(5, Math.max(0, saved.current));
      } catch {}
    }

    function bindOptions(containerId, onChange) {
      const container = $(containerId);
      container.querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => {
          container.querySelectorAll("button").forEach((item) => {
            item.className = "secondary";
          });
          button.className = "active";
          onChange(button.dataset.value);
        });
      });
    }

    function loadImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error(`${file.name} 이미지를 읽지 못했습니다.`));
        img.src = URL.createObjectURL(file);
      });
    }

    function ratioToNumber(value) {
      if (value === "auto") return null;
      const parts = value.split(":").map(Number);
      return parts[0] / parts[1];
    }

    function fitCropToRatio(width, height, ratio) {
      if (!ratio) return { width, height, offsetX: 0, offsetY: 0 };
      const current = width / height;
      if (current > ratio) {
        const targetW = Math.floor(height * ratio);
        return { width: targetW, height, offsetX: Math.floor((width - targetW) / 2), offsetY: 0 };
      }
      const targetH = Math.floor(width / ratio);
      return { width, height: targetH, offsetX: 0, offsetY: Math.floor((height - targetH) / 2) };
    }

    function resolveOutputSize(width, height) {
      if (resolution === "original") return { width, height };
      const ratio = ratioToNumber(aspectRatio) || (width / height);
      const portrait = ratio <= 1;
      if (resolution === "1080") return portrait ? { width: 1080, height: 1920 } : { width: 1920, height: 1080 };
      const longEdge = resolution === "4k" ? 3840 : 2560;
      const shortEdge = resolution === "4k" ? 2160 : 1440;
      return portrait ? { width: shortEdge, height: longEdge } : { width: longEdge, height: shortEdge };
    }

    function splitImage(img, sourceIndex, cols, rows) {
      const cellW = Math.floor(img.naturalWidth / cols);
      const cellH = Math.floor(img.naturalHeight / rows);
      const crop = fitCropToRatio(cellW, cellH, ratioToNumber(aspectRatio));
      const nextPieces = [];
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const pieceIndex = nextPieces.length + 1;
          const outputSize = resolveOutputSize(crop.width, crop.height);
          const canvas = document.createElement("canvas");
          canvas.width = outputSize.width;
          canvas.height = outputSize.height;
          const ctx = canvas.getContext("2d", { alpha: false });
          ctx.imageSmoothingEnabled = outputSize.width !== crop.width || outputSize.height !== crop.height;
          ctx.imageSmoothingQuality = "high";
          ctx.drawImage(img, col * cellW + crop.offsetX, row * cellH + crop.offsetY, crop.width, crop.height, 0, 0, outputSize.width, outputSize.height);
          nextPieces.push({
            fileName: `${sourceIndex}-${pieceIndex}.png`,
            width: outputSize.width,
            height: outputSize.height,
            url: canvas.toDataURL("image/png"),
            blobPromise: new Promise((resolve) => canvas.toBlob(resolve, "image/png"))
          });
        }
      }
      return nextPieces;
    }

    function renderPreview() {
      $("preview").innerHTML = "";
      pieces.slice(0, 12).forEach((piece) => {
        const item = document.createElement("div");
        item.className = "piece";
        item.innerHTML = `<img src="${piece.url}" alt="${piece.fileName}"><span>${piece.fileName} / ${piece.width}x${piece.height}</span>`;
        $("preview").appendChild(item);
      });
    }

    const crcTable = (() => {
      const table = new Uint32Array(256);
      for (let i = 0; i < 256; i++) {
        let value = i;
        for (let j = 0; j < 8; j++) {
          value = (value & 1) ? (0xedb88320 ^ (value >>> 1)) : (value >>> 1);
        }
        table[i] = value >>> 0;
      }
      return table;
    })();

    function crc32(bytes) {
      let crc = 0xffffffff;
      for (const byte of bytes) {
        crc = crcTable[(crc ^ byte) & 0xff] ^ (crc >>> 8);
      }
      return (crc ^ 0xffffffff) >>> 0;
    }

    function writeU16(bytes, value) {
      bytes.push(value & 0xff, (value >>> 8) & 0xff);
    }

    function writeU32(bytes, value) {
      bytes.push(value & 0xff, (value >>> 8) & 0xff, (value >>> 16) & 0xff, (value >>> 24) & 0xff);
    }

    function dosDateTime(date) {
      const year = Math.max(1980, date.getFullYear());
      const time = (date.getHours() << 11) | (date.getMinutes() << 5) | Math.floor(date.getSeconds() / 2);
      const day = ((year - 1980) << 9) | ((date.getMonth() + 1) << 5) | date.getDate();
      return { time, day };
    }

    async function createZipBlob(files) {
      const encoder = new TextEncoder();
      const chunks = [];
      const centralDirectory = [];
      let offset = 0;
      const { time, day } = dosDateTime(new Date());

      for (const file of files) {
        const data = new Uint8Array(await file.blob.arrayBuffer());
        const nameBytes = encoder.encode(file.name);
        const crc = crc32(data);
        const localHeader = [];

        writeU32(localHeader, 0x04034b50);
        writeU16(localHeader, 20);
        writeU16(localHeader, 0);
        writeU16(localHeader, 0);
        writeU16(localHeader, time);
        writeU16(localHeader, day);
        writeU32(localHeader, crc);
        writeU32(localHeader, data.length);
        writeU32(localHeader, data.length);
        writeU16(localHeader, nameBytes.length);
        writeU16(localHeader, 0);

        chunks.push(new Uint8Array(localHeader), nameBytes, data);

        const centralHeader = [];
        writeU32(centralHeader, 0x02014b50);
        writeU16(centralHeader, 20);
        writeU16(centralHeader, 20);
        writeU16(centralHeader, 0);
        writeU16(centralHeader, 0);
        writeU16(centralHeader, time);
        writeU16(centralHeader, day);
        writeU32(centralHeader, crc);
        writeU32(centralHeader, data.length);
        writeU32(centralHeader, data.length);
        writeU16(centralHeader, nameBytes.length);
        writeU16(centralHeader, 0);
        writeU16(centralHeader, 0);
        writeU16(centralHeader, 0);
        writeU16(centralHeader, 0);
        writeU32(centralHeader, 0);
        writeU32(centralHeader, offset);
        centralDirectory.push(new Uint8Array(centralHeader), nameBytes);

        offset += localHeader.length + nameBytes.length + data.length;
      }

      const centralOffset = offset;
      let centralSize = 0;
      for (const chunk of centralDirectory) centralSize += chunk.length;
      chunks.push(...centralDirectory);

      const endRecord = [];
      writeU32(endRecord, 0x06054b50);
      writeU16(endRecord, 0);
      writeU16(endRecord, 0);
      writeU16(endRecord, files.length);
      writeU16(endRecord, files.length);
      writeU32(endRecord, centralSize);
      writeU32(endRecord, centralOffset);
      writeU16(endRecord, 0);
      chunks.push(new Uint8Array(endRecord));

      return new Blob(chunks, { type: "application/zip" });
    }

    function downloadBlob(blob, fileName) {
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(link.href), 1000);
    }

    function zipFileName() {
      const now = new Date();
      const parts = [
        now.getFullYear(),
        String(now.getMonth() + 1).padStart(2, "0"),
        String(now.getDate()).padStart(2, "0"),
        String(now.getHours()).padStart(2, "0"),
        String(now.getMinutes()).padStart(2, "0"),
        String(now.getSeconds()).padStart(2, "0")
      ];
      return `split_images_${parts.join("")}.zip`;
    }

    async function downloadZip() {
      const files = [];
      for (const piece of pieces) {
        const blob = await piece.blobPromise;
        files.push({ name: piece.fileName, blob });
      }
      const zipBlob = await createZipBlob(files);
      downloadBlob(zipBlob, zipFileName());
    }

    $("promptTab").addEventListener("click", () => showTool("prompt"));
    $("imageTab").addEventListener("click", () => showTool("image"));
    $("pasteBtn").addEventListener("click", async () => {
      try {
        $("sourceText").value = await navigator.clipboard.readText();
        addLog("클립보드 붙여넣기");
      } catch {
        alert("브라우저가 클립보드 읽기를 막았습니다. 직접 붙여넣어 주세요.");
      }
    });
    $("splitBtn").addEventListener("click", () => {
      const parsed = parsePrompts($("sourceText").value);
      if (!parsed.length) {
        alert("프롬프트를 찾지 못했습니다.");
        return;
      }
      parsed.forEach((prompt, index) => {
        state.prompts[index] = prompt;
        state.done[index] = false;
      });
      state.current = 0;
      addLog(`프롬프트 ${parsed.length}개 자동 분리`);
      renderPrompts();
    });
    $("clearBtn").addEventListener("click", () => {
      if (!confirm("입력값과 진행 상태를 초기화할까요?")) return;
      state.prompts = Array(6).fill("");
      state.done = Array(6).fill(false);
      state.current = 0;
      state.log = [];
      $("sourceText").value = "";
      localStorage.removeItem("mobileWorkHelper");
      $("log").textContent = "아직 기록이 없습니다.";
      renderPrompts();
    });
    $("copyCurrentBtn").addEventListener("click", () => copyPrompt(state.current));
    $("nextBtn").addEventListener("click", () => {
      state.current = Math.min(5, state.current + 1);
      addLog(`프롬프트 ${state.current + 1}로 이동`);
      renderPrompts();
    });
    $("doneBtn").addEventListener("click", () => markDone(state.current));
    $("copyAllBtn").addEventListener("click", async () => {
      const all = state.prompts.map((prompt, index) => `Prompt ${index + 1}: ${prompt}`).join("\n\n");
      if (await copyText(all)) addLog("전체 프롬프트 복사");
    });
    $("sourceImages").addEventListener("change", () => {
      const count = $("sourceImages").files.length;
      $("fileStatus").textContent = count ? `${count}개 이미지 선택됨` : "선택한 이미지 없음";
    });
    $("runImageBtn").addEventListener("click", async () => {
      const files = [...$("sourceImages").files].filter((file) => file.type.startsWith("image/"));
      if (!files.length) {
        alert("먼저 이미지를 선택하세요.");
        return;
      }
      const cols = Math.max(1, Math.min(20, Number($("splitCols").value || 4)));
      const rows = Math.max(1, Math.min(20, Number($("splitRows").value || 2)));
      pieces = [];
      $("imageStatus").textContent = "이미지를 분할 중입니다.";
      try {
        for (let i = 0; i < files.length; i++) {
          const img = await loadImage(files[i]);
          pieces.push(...splitImage(img, i + 1, cols, rows));
        }
        renderPreview();
        $("imageStatus").textContent = `${pieces.length}개 이미지를 ZIP으로 묶는 중입니다.`;
        await downloadZip();
        $("imageStatus").textContent = `${pieces.length}개 이미지가 들어 있는 ZIP 다운로드를 요청했습니다.`;
      } catch (error) {
        $("imageStatus").textContent = error.message;
      }
    });

    bindOptions("aspectOptions", (value) => { aspectRatio = value; });
    bindOptions("resolutionOptions", (value) => { resolution = value; });
    loadLocal();
    renderPrompts();
    if (state.log.length) $("log").textContent = state.log.join("\n");
  </script>
</body>
</html>
