name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        shell: bash
        run: |
          set +e
          gradle :app:assembleDebug --stacktrace 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            grep -E -i "(^e: |error:|FAILURE:|What went wrong|Execution failed|Could not|Unresolved reference|Cannot access|A failure occurred)" build.log > build-error-lines.txt || true
            {
              echo "Gradle build failed. Last 200 log lines:"
              tail -n 200 build.log
            } > build-error-summary.txt
            if [ -s build-error-lines.txt ]; then
              echo "::error file=.github/workflows/android-debug-apk.yml,line=1::$(cat build-error-lines.txt | head -n 30 | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g; s/:/%3A/g')"
            else
              echo "::error file=.github/workflows/android-debug-apk.yml,line=1::$(tail -n 80 build.log | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g; s/:/%3A/g')"
            fi
            exit "$status"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shorts-auto-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: |
            build.log
            build-error-summary.txt
            build-error-lines.txt

      - name: Publish latest debug APK release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: Latest Debug APK
          body: |
            최신 디버그 APK입니다. 폰에서 app-debug.apk를 다운로드해 설치하세요.
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
          make_latest: true
