<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>통합 이미지 분할 모바일 테스트</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f6f8fb; color: #172033; }
    main { width: min(760px, 100%); margin: 0 auto; padding: 16px; }
    h1 { margin: 0 0 6px; font-size: 26px; letter-spacing: 0; }
    p { margin: 0; color: #667085; line-height: 1.45; }
    section { background: #fff; border: 1px solid #d9e0ea; border-radius: 8px; padding: 14px; margin: 12px 0; }
    label { display: block; font-weight: 700; margin-bottom: 8px; }
    input, select { width: 100%; border: 1px solid #d9e0ea; border-radius: 8px; padding: 12px; font: inherit; background: #fff; }
    button { border: 1px solid transparent; border-radius: 8px; min-height: 46px; padding: 10px 14px; font: inherit; font-weight: 700; cursor: pointer; background: #0f766e; color: white; width: 100%; }
    button.secondary { background: #fff; color: #172033; border-color: #d9e0ea; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .option-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .option-row.aspect { grid-template-columns: repeat(4, 1fr); }
    .option { background: #fff; color: #172033; border-color: #d9e0ea; }
    .option.active { background: #0f766e; color: white; border-color: #0f766e; }
    .status { color: #0f766e; font-weight: 700; margin-top: 10px; }
    .preview-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .piece { border: 1px solid #d9e0ea; border-radius: 8px; padding: 8px; background: #f8fafc; }
    .piece img { width: 100%; display: block; border-radius: 6px; background: #e5e7eb; }
    .piece span { display: block; margin-top: 6px; font-size: 12px; color: #475467; }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>통합 이미지 분할</h1>
      <p>폰 갤러리에서 통합 이미지를 선택하고, 잘린 이미지를 순서대로 다운로드합니다.</p>
    </header>

    <section>
      <label for="sourceImages">갤러리에서 통합 이미지 선택</label>
      <input id="sourceImages" type="file" accept="image/*" multiple>
      <p id="fileStatus" class="status">선택된 이미지 없음</p>
    </section>

    <section>
      <div class="grid">
        <div>
          <label for="splitCols">가로</label>
          <input id="splitCols" type="number" min="1" max="20" value="4">
        </div>
        <div>
          <label for="splitRows">세로</label>
          <input id="splitRows" type="number" min="1" max="20" value="2">
        </div>
      </div>
    </section>

    <section>
      <label>비율</label>
      <div class="option-row aspect" id="aspectOptions">
        <button class="option active" type="button" data-value="auto">원본</button>
        <button class="option" type="button" data-value="9:16">9:16</button>
        <button class="option" type="button" data-value="16:9">16:9</button>
        <button class="option" type="button" data-value="1:1">1:1</button>
      </div>
    </section>

    <section>
      <label>해상도</label>
      <div class="option-row" id="resolutionOptions">
        <button class="option active" type="button" data-value="original">원본</button>
        <button class="option" type="button" data-value="2k">2K</button>
        <button class="option" type="button" data-value="4k">4K</button>
      </div>
    </section>

    <section>
      <button id="runBtn" type="button">분할 이미지 다운로드</button>
      <p id="status" class="status">대기 중</p>
    </section>

    <section>
      <div id="preview" class="preview-grid"></div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    let aspectRatio = "auto";
    let resolution = "original";
    let pieces = [];

    function bindOptions(containerId, onChange) {
      const container = $(containerId);
      container.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          container.querySelectorAll("button").forEach(item => item.classList.remove("active"));
          button.classList.add("active");
          onChange(button.dataset.value);
        });
      });
    }

    function loadImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error(`${file.name} 이미지를 읽지 못했습니다.`));
        img.src = URL.createObjectURL(file);
      });
    }

    function ratioToNumber(value) {
      if (value === "auto") return null;
      const [w, h] = value.split(":").map(Number);
      return w / h;
    }

    function fitCropToRatio(width, height, ratio) {
      if (!ratio) return { width, height, offsetX: 0, offsetY: 0 };
      const current = width / height;
      if (current > ratio) {
        const targetW = Math.floor(height * ratio);
        return { width: targetW, height, offsetX: Math.floor((width - targetW) / 2), offsetY: 0 };
      }
      const targetH = Math.floor(width / ratio);
      return { width, height: targetH, offsetX: 0, offsetY: Math.floor((height - targetH) / 2) };
    }

    function resolveOutputSize(width, height) {
      if (resolution === "original") return { width, height };
      const ratio = ratioToNumber(aspectRatio) || (width / height);
      const portrait = ratio <= 1;
      const longEdge = resolution === "4k" ? 3840 : 2560;
      const shortEdge = resolution === "4k" ? 2160 : 1440;
      return portrait ? { width: shortEdge, height: longEdge } : { width: longEdge, height: shortEdge };
    }

    function splitImage(img, sourceIndex, cols, rows) {
      const cellW = Math.floor(img.naturalWidth / cols);
      const cellH = Math.floor(img.naturalHeight / rows);
      const crop = fitCropToRatio(cellW, cellH, ratioToNumber(aspectRatio));
      const nextPieces = [];

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const pieceIndex = nextPieces.length + 1;
          const outputSize = resolveOutputSize(crop.width, crop.height);
          const canvas = document.createElement("canvas");
          canvas.width = outputSize.width;
          canvas.height = outputSize.height;
          const ctx = canvas.getContext("2d", { alpha: false });
          ctx.imageSmoothingEnabled = outputSize.width !== crop.width || outputSize.height !== crop.height;
          ctx.imageSmoothingQuality = "high";
          ctx.drawImage(
            img,
            col * cellW + crop.offsetX,
            row * cellH + crop.offsetY,
            crop.width,
            crop.height,
            0,
            0,
            outputSize.width,
            outputSize.height
          );
          nextPieces.push({
            fileName: `${sourceIndex}-${pieceIndex}.png`,
            width: outputSize.width,
            height: outputSize.height,
            url: canvas.toDataURL("image/png"),
            blobPromise: new Promise(resolve => canvas.toBlob(resolve, "image/png"))
          });
        }
      }
      return nextPieces;
    }

    function renderPreview() {
      $("preview").innerHTML = "";
      pieces.slice(0, 12).forEach(piece => {
        const item = document.createElement("div");
        item.className = "piece";
        item.innerHTML = `<img src="${piece.url}" alt="${piece.fileName}"><span>${piece.fileName} / ${piece.width}x${piece.height}</span>`;
        $("preview").appendChild(item);
      });
    }

    async function downloadPieces() {
      for (const piece of pieces) {
        const blob = await piece.blobPromise;
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = piece.fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        await new Promise(resolve => setTimeout(resolve, 220));
      }
    }

    $("sourceImages").addEventListener("change", () => {
      const count = $("sourceImages").files.length;
      $("fileStatus").textContent = count ? `${count}개 통합 이미지 선택됨` : "선택된 이미지 없음";
    });

    $("runBtn").addEventListener("click", async () => {
      const files = [...$("sourceImages").files].filter(file => file.type.startsWith("image/"));
      if (!files.length) {
        alert("먼저 갤러리에서 이미지를 선택하세요.");
        return;
      }
      const cols = Math.max(1, Number($("splitCols").value || 4));
      const rows = Math.max(1, Number($("splitRows").value || 2));
      pieces = [];
      $("status").textContent = "이미지를 분할 중입니다.";

      for (let i = 0; i < files.length; i++) {
        const img = await loadImage(files[i]);
        pieces.push(...splitImage(img, i + 1, cols, rows));
      }

      renderPreview();
      $("status").textContent = `${pieces.length}개 이미지 다운로드를 시작합니다.`;
      await downloadPieces();
      $("status").textContent = `${pieces.length}개 이미지 다운로드를 요청했습니다.`;
    });

    bindOptions("aspectOptions", value => { aspectRatio = value; });
    bindOptions("resolutionOptions", value => { resolution = value; });
  </script>
</body>
</html>
